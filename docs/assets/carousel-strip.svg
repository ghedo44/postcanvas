  <text x="28" y="274" font-family="Inter,Arial,sans-serif" font-size="50" fill="#fff" font-weight="900">PROOF</text>
  <text x="28" y="322" font-family="Inter,Arial,sans-serif" font-size="20" fill="#cbd5e1">Responsive layouts.</text>
  <text x="28" y="352" font-family="Inter,Arial,sans-serif" font-size="20" fill="#cbd5e1">Real content, no breaks.</text>
