  <text x="28" y="274" font-family="Inter,Arial,sans-serif" font-size="50" fill="#fff" font-weight="900">SYSTEM</text>
  <text x="28" y="322" font-family="Inter,Arial,sans-serif" font-size="20" fill="#cbd5e1">Templates as an API.</text>
  <text x="28" y="352" font-family="Inter,Arial,sans-serif" font-size="20" fill="#cbd5e1">Themes and repeaters.</text>
