name: release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: postcanvas-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - name: Install development dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Check critical lint errors
        run: ruff check postcanvas tests
      - name: Compile all modules
        run: python -m compileall -q postcanvas tests

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Run test suite
        run: pytest -q --cov=postcanvas --cov-report=term-missing

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - name: Build and validate distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          twine check dist/*
      - name: Smoke-test installed wheel outside source tree
        run: |
          python -m venv /tmp/postcanvas-wheel-test
          /tmp/postcanvas-wheel-test/bin/python -m pip install --upgrade pip
          /tmp/postcanvas-wheel-test/bin/python -m pip install dist/*.whl
          export EXPECTED_VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          cd /tmp
          /tmp/postcanvas-wheel-test/bin/python -c "import os, postcanvas; assert postcanvas.__version__ == os.environ['EXPECTED_VERSION']"
      - uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish:
    needs: [lint, test, build]
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - name: Check whether version already exists
        id: version
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib
          import urllib.error
          import urllib.request

          with open("pyproject.toml", "rb") as file:
              version = tomllib.load(file)["project"]["version"]
          url = f"https://pypi.org/pypi/postcanvas/{version}/json"
          try:
              urllib.request.urlopen(url, timeout=15)
          except urllib.error.HTTPError as error:
              if error.code != 404:
                  raise
              print("publish=true")
          else:
              print("publish=false")
          print(f"version={version}")
          PY
      - name: Publish to PyPI with trusted publishing
        if: steps.version.outputs.publish == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Verify exact PyPI release artifacts
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python - <<'PY'
          import json
          import os
          import time
          import urllib.error
          import urllib.request

          version = os.environ["VERSION"]
          url = f"https://pypi.org/pypi/postcanvas/{version}/json"
          expected = {
              f"postcanvas-{version}-py3-none-any.whl",
              f"postcanvas-{version}.tar.gz",
          }
          last_error = None
          for _ in range(12):
              try:
                  with urllib.request.urlopen(url, timeout=30) as response:
                      payload = json.load(response)
                  actual = payload["info"]["version"]
                  files = {item["filename"] for item in payload["urls"]}
                  assert actual == version, (actual, version)
                  assert expected <= files, (expected, files)
                  print(f"verified postcanvas {actual}: {', '.join(sorted(expected))}")
                  break
              except (AssertionError, urllib.error.HTTPError, urllib.error.URLError) as error:
                  last_error = error
                  time.sleep(5)
          else:
              raise SystemExit(f"PyPI verification failed: {last_error}")
          PY

  github-release:
    needs: [publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub release for the verified PyPI version
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.publish.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "GitHub release $TAG already exists"
          else
            gh release create "$TAG" \
              --target "$GITHUB_SHA" \
              --title "postcanvas ${VERSION}" \
              --generate-notes
          fi
          gh release view "$TAG" --json tagName,name,isDraft,isPrerelease,url

  cleanup-branches:
    needs: [github-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete every branch except main
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh api --paginate "repos/${GITHUB_REPOSITORY}/branches?per_page=100" --jq '.[].name' |
          while IFS= read -r branch; do
            if [[ "$branch" == "main" ]]; then
              continue
            fi
            encoded="$(python -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1], safe=""))' "$branch")"
            echo "Deleting branch: $branch"
            gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/${encoded}"
          done

          mapfile -t remaining < <(
            gh api --paginate "repos/${GITHUB_REPOSITORY}/branches?per_page=100" --jq '.[].name'
          )
          printf 'Remaining branches: %s\n' "${remaining[*]}"
          [[ "${#remaining[@]}" -eq 1 && "${remaining[0]}" == "main" ]]
