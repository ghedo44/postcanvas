name: publish-pypi

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install development dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Check critical lint errors
        run: ruff check postcanvas tests
      - name: Compile all modules
        run: python -m compileall -q postcanvas tests

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Run test suite
        run: pytest -q --cov=postcanvas --cov-report=term-missing

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Build and validate distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          twine check dist/*
      - name: Smoke-test installed wheel outside source tree
        run: |
          python -m venv /tmp/postcanvas-wheel-test
          /tmp/postcanvas-wheel-test/bin/python -m pip install --upgrade pip
          /tmp/postcanvas-wheel-test/bin/python -m pip install dist/*.whl
          export EXPECTED_VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          cd /tmp
          /tmp/postcanvas-wheel-test/bin/python -c "import os, postcanvas; assert postcanvas.__version__ == os.environ['EXPECTED_VERSION']"
      - uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish:
    needs: [lint, test, build]
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - name: Check whether version already exists
        id: version
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib
          import urllib.error
          import urllib.request

          with open("pyproject.toml", "rb") as file:
              version = tomllib.load(file)["project"]["version"]
          url = f"https://pypi.org/pypi/postcanvas/{version}/json"
          try:
              urllib.request.urlopen(url, timeout=15)
          except urllib.error.HTTPError as error:
              if error.code != 404:
                  raise
              print("publish=true")
          else:
              print("publish=false")
          print(f"version={version}")
          PY
      - name: Publish to PyPI with trusted publishing
        if: steps.version.outputs.publish == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
