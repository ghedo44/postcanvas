name: verify-github-release-v100

on:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Verify public GitHub v1.0.0 release
        run: |
          python - <<'PY'
          import json
          import time
          import urllib.error
          import urllib.request

          url = "https://api.github.com/repos/ghedo44/postcanvas/releases/tags/v1.0.0"
          last_error = None
          for _ in range(24):
              try:
                  request = urllib.request.Request(
                      url,
                      headers={"Accept": "application/vnd.github+json"},
                  )
                  with urllib.request.urlopen(request, timeout=30) as response:
                      payload = json.load(response)
                  assert payload["tag_name"] == "v1.0.0", payload["tag_name"]
                  assert payload["name"] == "postcanvas 1.0.0", payload["name"]
                  assert payload["draft"] is False, payload["draft"]
                  assert payload["prerelease"] is False, payload["prerelease"]
                  assert payload["html_url"].endswith("/releases/tag/v1.0.0"), payload["html_url"]
                  print("verified GitHub release:", payload["html_url"])
                  print("target:", payload["target_commitish"])
                  break
              except (AssertionError, urllib.error.HTTPError, urllib.error.URLError) as error:
                  last_error = error
                  time.sleep(5)
          else:
              raise SystemExit(f"GitHub release verification failed: {last_error}")
          PY
