name: finalize-v1.0.1

on:
  pull_request:

permissions:
  contents: write

jobs:
  verify-clean-and-self-delete:
    runs-on: ubuntu-latest
    steps:
      - name: Verify PyPI and GitHub release, then remove stale branches
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import time
          import urllib.error
          import urllib.parse
          import urllib.request

          repository = os.environ["GITHUB_REPOSITORY"]
          current = os.environ["GITHUB_HEAD_REF"]
          token = os.environ["GH_TOKEN"]
          api_headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          def json_get(url, headers=None):
              request = urllib.request.Request(url, headers=headers or {})
              with urllib.request.urlopen(request, timeout=30) as response:
                  return json.load(response)

          def branches():
              names = []
              page = 1
              while True:
                  payload = json_get(
                      f"https://api.github.com/repos/{repository}/branches?per_page=100&page={page}",
                      api_headers,
                  )
                  names.extend(item["name"] for item in payload)
                  if len(payload) < 100:
                      return names
                  page += 1

          last_error = None
          for _ in range(72):
              try:
                  pypi = json_get("https://pypi.org/pypi/postcanvas/1.0.1/json")
                  filenames = {item["filename"] for item in pypi["urls"]}
                  assert pypi["info"]["version"] == "1.0.1"
                  assert {
                      "postcanvas-1.0.1-py3-none-any.whl",
                      "postcanvas-1.0.1.tar.gz",
                  } <= filenames

                  release = json_get(
                      f"https://api.github.com/repos/{repository}/releases/tags/v1.0.1",
                      api_headers,
                  )
                  assert release["tag_name"] == "v1.0.1"
                  assert release["name"] == "postcanvas 1.0.1"
                  assert release["draft"] is False
                  assert release["prerelease"] is False
                  break
              except (AssertionError, KeyError, urllib.error.HTTPError, urllib.error.URLError) as error:
                  last_error = error
                  time.sleep(5)
          else:
              raise SystemExit(f"Release verification failed: {last_error}")

          before = branches()
          print("Branches before cleanup:", ", ".join(sorted(before)))
          for branch in before:
              if branch in {"main", current}:
                  continue
              ref = urllib.parse.quote(f"heads/{branch}", safe="/")
              request = urllib.request.Request(
                  f"https://api.github.com/repos/{repository}/git/refs/{ref}",
                  headers=api_headers,
                  method="DELETE",
              )
              with urllib.request.urlopen(request, timeout=30):
                  pass
              print("Deleted branch:", branch)

          after = set(branches())
          assert after == {"main", current}, after
          print("Verified PyPI files:", ", ".join(sorted(filenames)))
          print("Verified GitHub release:", release["html_url"])
          print("Branches before self-delete:", ", ".join(sorted(after)))
          PY

      - name: Delete the temporary verification branch
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/${GITHUB_HEAD_REF}"
          echo "Deleted temporary branch ${GITHUB_HEAD_REF}; main is the only remaining branch."
